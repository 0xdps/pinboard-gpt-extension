<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PinGPT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-logo">
      <img src="PinGPT-Logo.svg" alt="PinGPT" class="logo" />
    </div>
    <div>
      <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
    </div>
  </div>
  
  <input id="search" placeholder="Search pins or tags..." />
  <div id="list"></div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Settings</h3>
        <button id="closeSettings" class="close-btn">×</button>
      </div>
      
      <div class="settings-section">
        <h4>Sync</h4>
        <div class="sync-setting">
          <div class="sync-info">
            <span id="syncText">🔄 Syncing across devices</span>
            <small id="syncDesc">Automatically sync pins across your Chrome devices</small>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="syncToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <div class="settings-section">
        <h4>Data Management</h4>
        <div class="data-buttons">
          <button id="exportBtn" class="data-btn">📤 Export Pins</button>
          <button id="importBtn" class="data-btn">📥 Import Pins</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Coffee Button -->
  <div class="coffee-section">
    <a href="https://www.buymeacoffee.com/0xdps" target="_blank" class="coffee-btn">
      ☕ Buy me a coffee
    </a>
  </div>

  <input type="file" id="importFile" style="display:none" accept="application/json" />
  <script src="idb.js"></script>
  <script src="popup.js"></script>
</body>
</html>
