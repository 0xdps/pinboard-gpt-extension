<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math CAPTCHA Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .captcha-test { background: #f0f8ff; padding: 20px; border-radius: 8px; margin: 20px 0; }
        input { padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; width: 200px; font-size: 16px; }
        button { padding: 10px 20px; background: #10a37f; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0d8968; }
        .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Math CAPTCHA Test</h1>
    <p>This page tests the math CAPTCHA functionality used in the goodbye page.</p>
    
    <div class="captcha-test">
        <h3>Math Verification</h3>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 8px; font-size: 18px;">What is <strong id="question" style="color: #10a37f; font-size: 20px;"></strong>?</label>
            <input type="number" id="answer" placeholder="Enter your answer" min="11" max="18">
            <input type="hidden" id="correct-answer" value="">
        </div>
        <div style="margin-bottom: 15px;">
            <button onclick="checkAnswer()" style="margin-right: 10px;">Check Answer</button>
            <button onclick="generateNew()">New Problem</button>
        </div>
        <div id="result"></div>
    </div>
    
    <div>
        <h3>Test Results</h3>
        <p>✓ Correct answers: <span id="correct-count">0</span></p>
        <p>✗ Wrong answers: <span id="wrong-count">0</span></p>
        <p>Total problems: <span id="total-count">0</span></p>
    </div>

    <script>
        let correctCount = 0;
        let wrongCount = 0;
        let totalCount = 0;

        function generateCaptcha() {
            // Generate two single digits where sum > 10
            // Possible combinations: 2+9=11, 3+8=11, 3+9=12, 4+7=11, 4+8=12, 4+9=13, etc.
            let num1, num2, answer;
            do {
                num1 = Math.floor(Math.random() * 9) + 1;  // 1-9
                num2 = Math.floor(Math.random() * 9) + 1;  // 1-9
                answer = num1 + num2;
            } while (answer <= 10);  // Keep generating until sum > 10
            
            document.getElementById('question').textContent = `${num1} + ${num2}`;
            document.getElementById('correct-answer').value = answer;
            document.getElementById('answer').value = '';
            document.getElementById('result').innerHTML = '';
            
            console.log(`Generated: ${num1} + ${num2} = ${answer} (sum > 10: ${answer > 10})`);
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const correctAnswer = parseInt(document.getElementById('correct-answer').value);
            const resultDiv = document.getElementById('result');
            
            totalCount++;
            
            if (userAnswer === correctAnswer) {
                correctCount++;
                resultDiv.innerHTML = `<div class="success">✓ Correct! ${correctAnswer} is right.</div>`;
            } else {
                wrongCount++;
                resultDiv.innerHTML = `<div class="error">✗ Wrong! The answer is ${correctAnswer}, you answered ${userAnswer}.</div>`;
            }
            
            updateStats();
        }

        function generateNew() {
            generateCaptcha();
        }

        function updateStats() {
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            document.getElementById('total-count').textContent = totalCount;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            generateCaptcha();
            
            // Allow Enter key to check answer
            document.getElementById('answer').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkAnswer();
                }
            });
        });
    </script>
</body>
</html>
