<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pinboard GPT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header" role="banner">
    <div class="header-content">
      <div class="header-title-row">
        <img class="header-icon" src="icons/icon-24.png" alt="Pinboard GPT" aria-hidden="true" />
        <h1 class="header-title">Pinboard <span class="header-subtitle">GPT</span></h1>
        <span class="header-badge" id="syncStatus" aria-live="polite" aria-atomic="true">Free</span>
      </div>
    </div>
    <div class="header-actions">
      <button id="settingsBtn" class="icon-btn" data-tooltip="Settings" aria-label="Open settings menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>
  
  <div class="tabs" role="tablist" aria-label="Pin filters">
    <button id="filterAll" class="tab active" role="tab" aria-selected="true">All</button>
    <button id="filterChats" class="tab" role="tab" aria-selected="false">Chats</button>
    <button id="filterMessages" class="tab" role="tab" aria-selected="false">Messages</button>
  </div>
  
  <div class="search-box">
    <input id="search" type="text" placeholder="Search pins..." aria-label="Search pins by title, content, or tags" />
  </div>
  
  <div id="list" role="region" aria-label="Pins list"></div>

  <!-- Pin Template (hidden by default) -->
  <div id="pinTemplate" class="pin-item" style="display: none;" role="article">
    <div class="pin-main">
      <div class="pin-header">
        <div class="pin-title"></div>
      </div>
      <div class="pin-preview"></div>
      <div class="pin-tags"></div>
    </div>
    <div class="pin-actions" role="toolbar" aria-label="Pin actions">
      <button class="icon-btn open-btn" data-tooltip="Open" aria-label="Navigate to this pin">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
      </button>
      <button class="icon-btn edit-btn" data-tooltip="Edit" aria-label="Edit this pin">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn delete-btn" data-tooltip="Delete" aria-label="Delete this pin">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-header">
        <h3 id="editModalTitle">Edit Pin</h3>
        <button id="closeEditModal" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="editTitle">Title</label>
          <input id="editTitle" type="text" />
        </div>
        <div class="form-group">
          <label for="editDesc">Notes</label>
          <textarea id="editDesc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="editTags">Tags</label>
          <input id="editTags" type="text" placeholder="Separate with commas" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelEditBtn" class="btn-text">Cancel</button>
        <button id="saveEditBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <h3 id="settingsTitle">Settings</h3>
        <button id="closeSettings" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <!-- Preferences -->
        <div class="settings-group">
          <h4>Preferences</h4>
          <div class="setting-row">
            <div class="setting-label">
              <svg class="setting-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M3.05 11h2m14.9 0h2M6.34 6.34l1.42 1.42m8.49 8.49l1.41 1.41M6.34 17.66l1.42-1.42m8.49-8.49l1.41-1.41"/><circle cx="12" cy="12" r="3"/></svg>
              <span id="debugText">Debug mode</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="debugToggle">
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <!-- Account -->
        <div class="settings-group">
          <h4>Account</h4>
          <div id="authSection" style="display: none;">
            <button id="googleSignInBtn" class="btn-secondary">
              <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              Continue with Google
            </button>
          </div>
          <div id="accountSection" style="display: none;">
            <div class="account-info">
              <p><span id="userEmail">user@example.com</span></p>
              <small id="licenseDetails"></small>
            </div>
            <div class="account-actions">
              <button id="syncLicenseBtn" class="btn-text">Sync License</button>
              <button id="logoutBtn" class="btn-text">Sign Out</button>
            </div>
          </div>
        </div>

        <!-- Data -->
        <div class="settings-group">
          <h4>Data</h4>
          <button id="importBtn" class="btn-text">Import Pins</button>
          <button id="exportBtn" class="btn-text">Export Pins</button>
          <button id="deleteAllBtn" class="btn-text danger">Delete All Pins</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-body">
        <h3 id="confirmTitle">Confirm</h3>
        <p id="confirmMessage">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button id="confirmCancel" class="btn-text">Cancel</button>
        <button id="confirmExport" class="btn-text" style="display: none;">Export First</button>
        <button id="confirmOK" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Upgrade Modal -->
  <div id="upgradeModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog upgrade-dialog" role="dialog" aria-modal="true" aria-labelledby="upgradeTitle">
      <div class="modal-body">
        <h3 id="upgradeTitle">Free limit reached</h3>
        <p id="upgradeDescription">Upgrade to Pro for unlimited pins</p>
        <div class="pricing-simple">
          <div class="plan-item">
            <h4>Pro</h4>
            <div class="plan-price">$9.99</div>
            <ul class="plan-list">
              <li>Unlimited pins</li>
              <li>Cloud sync</li>
              <li>Export data</li>
            </ul>
            <button class="upgrade-btn btn-primary" data-plan="pro">Upgrade</button>
          </div>
        </div>
      </div>
      <button id="closeUpgrade" class="modal-close" aria-label="Close">×</button>
    </div>
  </div>

  <input type="file" id="importFile" style="display:none" accept="application/json" />
  <script src="debug.js"></script>
  <script src="ui-config.js"></script>
  <script src="virtual-scroll.js"></script>
  <script src="idb.js"></script>
  <script src="license.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
