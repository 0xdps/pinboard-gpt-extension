<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pinboard GPT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header" role="banner">
    <div class="header-content">
      <div class="header-title-row">
        <img class="header-icon" src="icons/icon-24.png" alt="Pinboard GPT" aria-hidden="true" />
        <h1 class="header-title">Pinboard <span class="header-subtitle">GPT</span></h1>
      </div>
      <p class="header-status" id="syncStatus" aria-live="polite" aria-atomic="true">Free</p>
    </div>
    <div class="header-actions">
      <button id="settingsBtn" class="icon-btn" data-tooltip="Settings" aria-label="Open settings menu">⚙️</button>
    </div>
  </div>
  
  <div class="tabs" role="tablist" aria-label="Pin filters">
    <button id="filterAll" class="tab active" role="tab" aria-selected="true">All</button>
    <button id="filterChats" class="tab" role="tab" aria-selected="false">Chats</button>
    <button id="filterMessages" class="tab" role="tab" aria-selected="false">Messages</button>
  </div>
  
  <div class="search-box">
    <input id="search" type="text" placeholder="Search pins..." aria-label="Search pins by title, content, or tags" />
  </div>
  
  <div id="list" role="region" aria-label="Pins list"></div>

  <!-- Pin Template (hidden by default) -->
  <div id="pinTemplate" class="pin-item" style="display: none;" role="article">
    <div class="pin-main">
      <div class="pin-header">
        <div class="pin-title"></div>
        <button class="pin-btn open-btn" data-tooltip="Open" aria-label="Navigate to this pin">→</button>
      </div>
      <div class="pin-preview"></div>
      <div class="pin-tags"></div>
    </div>
    <div class="pin-actions" role="toolbar" aria-label="Pin actions">
      <button class="icon-btn edit-btn" data-tooltip="Edit" aria-label="Edit this pin">✎</button>
      <button class="icon-btn info-btn" data-tooltip="Info" aria-label="View pin details">ⓘ</button>
      <button class="icon-btn delete-btn" data-tooltip="Delete" aria-label="Delete this pin">✕</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <div class="modal-header">
        <h3 id="editModalTitle">Edit Pin</h3>
        <button id="closeEditModal" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="editTitle">Title</label>
          <input id="editTitle" type="text" />
        </div>
        <div class="form-group">
          <label for="editDesc">Notes</label>
          <textarea id="editDesc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="editTags">Tags</label>
          <input id="editTags" type="text" placeholder="Separate with commas" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancelEditBtn" class="btn-text">Cancel</button>
        <button id="saveEditBtn" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <h3 id="settingsTitle">Settings</h3>
        <button id="closeSettings" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <!-- Preferences -->
        <div class="settings-group">
          <h4>Preferences</h4>
          <div class="setting-row">
            <div class="setting-label">
              <span id="themeText">Dark mode</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="themeToggle">
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="setting-row">
            <div class="setting-label">
              <span id="debugText">Debug mode</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="debugToggle">
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <!-- Account -->
        <div class="settings-group">
          <h4>Account</h4>
          <div id="authSection" style="display: none;">
            <button id="googleSignInBtn" class="btn-google">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7h14"/></svg>
              Sign in with Google
            </button>
          </div>
          <div id="accountSection" style="display: none;">
            <div class="account-info">
              <p><span id="userEmail">user@example.com</span></p>
              <small id="licenseDetails"></small>
            </div>
            <div class="account-actions">
              <button id="syncLicenseBtn" class="btn-text">Sync License</button>
              <button id="logoutBtn" class="btn-text">Sign Out</button>
            </div>
          </div>
        </div>

        <!-- Data -->
        <div class="settings-group">
          <h4>Data</h4>
          <button id="importBtn" class="btn-text">Import Pins</button>
          <button id="exportBtn" class="btn-text">Export Pins</button>
          <button id="deleteAllBtn" class="btn-text danger">Delete All Pins</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-body">
        <h3 id="confirmTitle">Confirm</h3>
        <p id="confirmMessage">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button id="confirmCancel" class="btn-text">Cancel</button>
        <button id="confirmExport" class="btn-text" style="display: none;">Export First</button>
        <button id="confirmOK" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Upgrade Modal -->
  <div id="upgradeModal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-dialog upgrade-dialog" role="dialog" aria-modal="true" aria-labelledby="upgradeTitle">
      <div class="modal-body">
        <h3 id="upgradeTitle">Free limit reached</h3>
        <p id="upgradeDescription">Upgrade to Pro for unlimited pins</p>
        <div class="pricing-simple">
          <div class="plan-item">
            <h4>Pro</h4>
            <div class="plan-price">$9.99</div>
            <ul class="plan-list">
              <li>Unlimited pins</li>
              <li>Cloud sync</li>
              <li>Export data</li>
            </ul>
            <button class="upgrade-btn btn-primary" data-plan="pro">Upgrade</button>
          </div>
        </div>
      </div>
      <button id="closeUpgrade" class="modal-close" aria-label="Close">×</button>
    </div>
  </div>

  <input type="file" id="importFile" style="display:none" accept="application/json" />
  <script src="debug.js"></script>
  <script src="ui-config.js"></script>
  <script src="idb.js"></script>
  <script src="license.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
