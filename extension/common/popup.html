<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GPT Pinboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-branding">
      <img src="icons/icon-32.png" alt="GPT Pinboard" class="logo" />
      <div class="header-text">
        <h1 class="header-title">GPT Pinboard</h1>
        <p class="header-subtitle">Pin the messages that matter</p>
      </div>
    </div>
    <div>
      <button id="settingsBtn" class="settings-btn" data-tooltip="Settings">⚙️</button>
    </div>
  </div>
  
  <div class="search-container">
    <input id="search" placeholder="Search pins or tags..." />
    <button id="clearSearch" class="clear-search-btn" data-tooltip="Clear search">×</button>
  </div>
  <div id="list"></div>

  <!-- Pin Template (hidden by default) -->
  <div id="pinTemplate" class="pin" style="display: none;">
    <div class="pin-content">
      <div class="pin-title"></div>
      <div class="pin-message"></div>
      <div class="pin-tags"></div>
    </div>
    <div class="pin-actions">
      <button class="iconBtn openBtn" data-tooltip="Open pin">→</button>
      <button class="iconBtn deleteBtn" data-tooltip="Delete pin">✕</button>
      <button class="iconBtn infoBtn" data-tooltip="Info">ⓘ</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Settings</h3>
        <button id="closeSettings" class="close-btn" data-tooltip="Close">×</button>
      </div>
      
      <div class="settings-section">
        <h4>Appearance</h4>
        <div class="theme-setting">
          <div class="theme-info">
            <span id="themeText">🌙 Dark mode</span>
            <small id="themeDesc">Switch between light and dark themes</small>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="themeToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h4>Sync</h4>
        <div class="sync-setting">
          <div class="sync-info">
            <span id="syncText">🔄 Syncing across devices</span>
            <small id="syncDesc">Automatically sync pins across your Chrome devices</small>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="syncToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <div class="settings-section">
        <h4>Data Management</h4>
        <div class="data-buttons">
          <button id="exportBtn" class="data-btn">📤 Export Pins</button>
          <button id="importBtn" class="data-btn">📥 Import Pins</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Coffee Button -->
  <div class="coffee-section">
    <a href="https://www.buymeacoffee.com/0xdps" target="_blank" class="coffee-btn">
      ☕ Buy me a coffee
    </a>
  </div>

  <input type="file" id="importFile" style="display:none" accept="application/json" />
  <script src="idb.js"></script>
  <script src="popup.js"></script>
</body>
</html>
