<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Poster 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 1280px;
            height: 800px;
            background: linear-gradient(135deg, #ff6b35 0%, #f59e0b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .poster {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            text-align: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            background: white;
            padding: 16px 32px;
            border-radius: 50px;
            margin-bottom: 60px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .brand-icon {
            width: 32px;
            height: 32px;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
        }

        .headline {
            font-size: 96px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -3px;
            margin-bottom: 40px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .subheadline {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            margin-bottom: 60px;
            max-width: 800px;
        }

        .footer {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="brand">
            <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="brand-icon">
            <span class="brand-name">Pinboard GPT</span>
        </div>

        <h1 class="headline">
            Never lose a<br>ChatGPT message
        </h1>

        <p class="subheadline">
            Save, organize, and instantly find the messages that matter
        </p>

        <div class="footer">pinboardgpt.app</div>
    </div>
</body>
</html>
