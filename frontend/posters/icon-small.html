<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Icon 128x128</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .poster {
            width: 128px;
            height: 128px;
            background: linear-gradient(135deg, #ff6b35 0%, #f59e0b 100%);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 16px;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 8px;
        }

        .text {
            font-size: 11px;
            font-weight: 900;
            color: white;
            text-align: center;
            line-height: 1.2;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="poster">
        <img src="../images/favicon-48x48.png" alt="Pinboard GPT" class="icon">
        <div class="text">Pinboard<br>GPT</div>
    </div>
</body>
</html>
