<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Poster 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 1280px;
            height: 800px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .poster {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            text-align: center;
        }

        .headline {
            font-size: 96px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -3px;
            margin-bottom: 40px;
        }

        .highlight {
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            margin-bottom: 60px;
            max-width: 1000px;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .feature-label {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .cta {
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            color: white;
            padding: 24px 60px;
            border-radius: 16px;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.4);
            margin-bottom: 32px;
            display: inline-block;
        }

        .website {
            font-size: 24px;
            color: #64748b;
            font-weight: 700;
        }

        .website span {
            color: #ff6b35;
        }

        .badges {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="poster">
        <h1 class="headline">
            Start saving your<br><span class="highlight">best answers</span>
        </h1>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🆓</div>
                <div class="feature-label">Free 10 Pins</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-label">Lightning Fast</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-label">Privacy First</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🌐</div>
                <div class="feature-label">Chrome & Firefox</div>
            </div>
        </div>

        <div class="cta">Install Now</div>

        <div class="website">
            <span>pinboard-gpt.dps.codes</span>
        </div>

        <div class="badges">
            <div class="badge">200+ Smart Tags</div>
            <div class="badge">17 Categories</div>
            <div class="badge">Fuzzy Search</div>
        </div>
    </div>
</body>
</html>
