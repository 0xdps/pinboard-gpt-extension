<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Posters</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .viewer-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .poster-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .poster-frame {
            width: 1280px;
            height: 800px;
            position: relative;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            overflow: hidden;
        }

        iframe {
            width: 1280px;
            height: 800px;
            border: none;
        }

        /* Overlay controls inside poster frame */
        .poster-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            z-index: 100;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #f59e0b);
            transition: width 0.3s ease;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1280px;
            padding: 0 20px;
        }

        .keyboard-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            transform: scale(1);
        }

        /* Responsive scaling */
        @media (max-width: 1400px) {
            .poster-wrapper {
                transform: scale(0.85);
            }
        }

        @media (max-width: 1200px) {
            .poster-wrapper {
                transform: scale(0.7);
            }
        }

        @media (max-width: 900px) {
            .poster-wrapper {
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <div class="poster-wrapper">
            <div class="poster-frame">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
                <div class="poster-indicator" id="posterIndicator">1 / 5</div>
                <iframe id="posterFrame" src="1.html"></iframe>
            </div>

            <div class="controls-row">
                <div class="keyboard-hint">Use arrow keys or buttons to navigate</div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" title="Previous (←)">◀</button>
                    <button class="nav-btn" id="nextBtn" title="Next (→)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const totalPosters = 5;
        let currentPoster = 1;

        const posterFrame = document.getElementById('posterFrame');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const posterIndicator = document.getElementById('posterIndicator');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function updatePoster() {
            posterFrame.src = `${currentPoster}.html`;
            posterIndicator.textContent = `${currentPoster} / ${totalPosters}`;
            
            // Update progress bar
            const progress = (currentPoster / totalPosters) * 100;
            progressFill.style.width = progress + '%';
            
            // Update button states
            prevBtn.disabled = currentPoster === 1;
            nextBtn.disabled = currentPoster === totalPosters;
        }

        function nextPoster() {
            if (currentPoster < totalPosters) {
                currentPoster++;
                updatePoster();
            }
        }

        function prevPoster() {
            if (currentPoster > 1) {
                currentPoster--;
                updatePoster();
            }
        }

        // Button navigation
        nextBtn.addEventListener('click', nextPoster);
        prevBtn.addEventListener('click', prevPoster);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextPoster();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevPoster();
            } else if (e.key === 'Home') {
                e.preventDefault();
                currentPoster = 1;
                updatePoster();
            } else if (e.key === 'End') {
                e.preventDefault();
                currentPoster = totalPosters;
                updatePoster();
            }
        });

        // Fullscreen toggle
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ Exit Fullscreen';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ Fullscreen';
            }
        });

        // Update fullscreen button text on fullscreen change
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ Fullscreen';
            }
        });

        // Mouse wheel navigation (optional)
        let wheelTimeout;
        document.addEventListener('wheel', (e) => {
            clearTimeout(wheelTimeout);
            wheelTimeout = setTimeout(() => {
                if (e.deltaY > 0) {
                    nextPoster();
                } else if (e.deltaY < 0) {
                    prevPoster();
                }
            }, 100);
        }, { passive: true });

        // Touch swipe support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                nextPoster();
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                prevPoster();
            }
        }

        // Initialize
        updatePoster();
    </script>
</body>
</html>
