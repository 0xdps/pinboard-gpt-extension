<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Poster 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 1280px;
            height: 800px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .poster {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            padding: 80px;
        }

        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-right: 60px;
        }

        .number {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .headline {
            font-size: 72px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 32px;
        }

        .description {
            font-size: 24px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mockup {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            margin-bottom: 16px;
        }

        .message-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .pin-button {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
        }

        .arrow {
            position: absolute;
            font-size: 48px;
            color: #ff6b35;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-size: 18px;
            color: #64748b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="left">
            <div class="number">01</div>
            <h1 class="headline">
                Hover & Pin
            </h1>
            <p class="description">
                Simply hover over any ChatGPT message and click the pin button. It's that easy.
            </p>
        </div>

        <div class="right">
            <div class="mockup">
                <div class="message-box">
                    <div class="message-text">
                        Here's how to optimize your React app performance...
                    </div>
                    <div class="pin-button"><img src="../images/favicon-16x16.png" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"> Pin</div>
                </div>
                <div class="arrow" style="top: -60px; right: 80px;">↑</div>
            </div>
        </div>

        <div class="footer">pinboard-gpt.dps.codes</div>
    </div>
</body>
</html>
