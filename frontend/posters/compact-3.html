<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            color: white;
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 25px;
            margin-bottom: 1rem;
        }

        .brand-icon {
            width: 20px;
            height: 20px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
        }

        .headline {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .modal-mockup {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .tag-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .tag {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag.selected {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-color: #8b5cf6;
            color: white;
        }

        .tag-emoji {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .tag-count {
            font-size: 10px;
            color: #64748b;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="brand">
            <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="brand-icon">
            <span class="brand-name">Pinboard GPT</span>
        </div>
        <h1 class="headline">Organize with Tags</h1>
        
        <div class="modal-mockup">
            <div class="modal-header">Add tags (200+ presets)</div>
            <div class="tag-grid">
                <div class="tag selected">
                    <div class="tag-emoji">💻</div>
                    <div>Code</div>
                </div>
                <div class="tag selected">
                    <div class="tag-emoji">🐍</div>
                    <div>Python</div>
                </div>
                <div class="tag">
                    <div class="tag-emoji">⚛️</div>
                    <div>React</div>
                </div>
                <div class="tag">
                    <div class="tag-emoji">🎨</div>
                    <div>Design</div>
                </div>
                <div class="tag selected">
                    <div class="tag-emoji">📝</div>
                    <div>Tutorial</div>
                </div>
                <div class="tag">
                    <div class="tag-emoji">🚀</div>
                    <div>DevOps</div>
                </div>
            </div>
            <div class="tag-count">3 tags selected</div>
        </div>
    </div>
</body>
</html>
