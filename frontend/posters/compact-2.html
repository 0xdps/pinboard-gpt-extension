<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            color: white;
        }

        .headline {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .chat-message {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10a37f, #1a7f64);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .username {
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
        }

        .message-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .pin-button {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
            animation: pulse 2s infinite;
        }

        .pin-icon {
            width: 12px;
            height: 12px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="poster">
        <h1 class="headline">Hover & Pin Messages</h1>
        
        <div class="chat-message">
            <div class="message-header">
                <div class="avatar">AI</div>
                <span class="username">ChatGPT</span>
            </div>
            <div class="message-text">
                Here's how to optimize your React app performance using lazy loading...
            </div>
            <div class="pin-button">
                <img src="../images/favicon-16x16.png" alt="Pin" class="pin-icon">
                <span>Pin</span>
            </div>
        </div>
    </div>
</body>
</html>
