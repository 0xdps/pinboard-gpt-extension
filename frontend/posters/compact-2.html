<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            text-align: center;
            color: white;
        }

        .number {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .headline {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .description {
            font-size: 1rem;
            color: #94a3b8;
            font-weight: 600;
        }

        .pin-demo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 1rem;
        }

        .pin-icon {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="number">01</div>
        <h1 class="headline">Hover & Pin</h1>
        <p class="description">
            Click the pin button on any message
        </p>
        <div class="pin-demo">
            <img src="../images/favicon-16x16.png" alt="Pin" class="pin-icon">
            <span>Pin</span>
        </div>
    </div>
</body>
</html>
