<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Promo 1400x560</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .poster {
            width: 1400px;
            height: 560px;
            background: linear-gradient(135deg, #ff6b35 0%, #f59e0b 100%);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            padding: 60px 80px;
        }

        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 24px;
            border-radius: 40px;
            margin-bottom: 32px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            width: fit-content;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 800;
            color: #1e293b;
        }

        .headline {
            font-size: 72px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 24px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .subheadline {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            margin-bottom: 32px;
            max-width: 600px;
        }

        .features {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            color: white;
        }

        .footer {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mockup {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .mockup-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 16px;
        }

        .mockup-icon {
            width: 24px;
            height: 24px;
        }

        .mockup-title {
            font-size: 16px;
            font-weight: 800;
            color: #1e293b;
        }

        .pin-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .pin-title {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .pin-tags {
            display: flex;
            gap: 6px;
        }

        .tag {
            background: linear-gradient(135deg, #ff6b35, #f59e0b);
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="left">
            <div class="brand">
                <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="brand-icon">
                <span class="brand-name">Pinboard GPT</span>
            </div>

            <h1 class="headline">
                Never lose a<br>ChatGPT message
            </h1>

            <p class="subheadline">
                Save, organize, and instantly find the messages that matter
            </p>

            <div class="features">
                <span class="feature">🆓 Free to Start</span>
                <span class="feature">⚡ Lightning Fast</span>
                <span class="feature">🏷️ 200+ Tags</span>
            </div>

            <div class="footer">pinboard-gpt.dps.codes</div>
        </div>

        <div class="right">
            <div class="mockup">
                <div class="mockup-header">
                    <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="mockup-icon">
                    <span class="mockup-title">Your Pins</span>
                </div>
                
                <div class="pin-card">
                    <div class="pin-title">Python async guide</div>
                    <div class="pin-tags">
                        <span class="tag">python</span>
                        <span class="tag">code</span>
                    </div>
                </div>

                <div class="pin-card">
                    <div class="pin-title">React hooks tutorial</div>
                    <div class="pin-tags">
                        <span class="tag">react</span>
                        <span class="tag">tutorial</span>
                    </div>
                </div>

                <div class="pin-card">
                    <div class="pin-title">Docker best practices</div>
                    <div class="pin-tags">
                        <span class="tag">docker</span>
                        <span class="tag">devops</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
