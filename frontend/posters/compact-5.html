<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            color: white;
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 25px;
            margin-bottom: 1rem;
        }

        .brand-icon {
            width: 20px;
            height: 20px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
        }

        .headline {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .outline-mockup {
            background: white;
            border-radius: 12px;
            padding: 18px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .mockup-header {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 14px;
        }

        .outline-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #1e293b;
        }

        .outline-label {
            font-size: 9px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .outline-text {
            font-size: 12px;
            font-weight: 600;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="brand">
            <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="brand-icon">
            <span class="brand-name">Pinboard GPT</span>
        </div>
        <h1 class="headline">Chat Outline</h1>
        
        <div class="outline-mockup">
            <div class="mockup-header">📋 Navigate conversations</div>
            
            <div class="outline-item">
                <div class="outline-label">User</div>
                <div class="outline-text">How do I optimize React?</div>
            </div>

            <div class="outline-item">
                <div class="outline-label">Assistant</div>
                <div class="outline-text">Here are 5 key strategies...</div>
            </div>

            <div class="outline-item">
                <div class="outline-label">User</div>
                <div class="outline-text">What about lazy loading?</div>
            </div>
        </div>
    </div>
</body>
</html>
