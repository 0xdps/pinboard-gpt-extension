<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinboard GPT - Poster 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 1280px;
            height: 800px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .poster {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            padding: 80px;
        }

        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-right: 60px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 24px;
            border-radius: 40px;
            margin-bottom: 32px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            width: fit-content;
        }

        .brand-icon {
            width: 24px;
            height: 24px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 800;
            color: #1e293b;
        }

        .headline {
            font-size: 72px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 32px;
        }

        .description {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.5;
        }

        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mockup {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .mockup-header {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
        }

        .tag-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .tag {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag.selected {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border-color: #8b5cf6;
            color: white;
        }

        .tag-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .tag-name {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
        }

        .tag.selected .tag-name {
            color: white;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="left">
            <div class="brand">
                <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="brand-icon">
                <span class="brand-name">Pinboard GPT</span>
            </div>
            <h1 class="headline">
                Organize<br>with Tags
            </h1>
            <p class="description">
                Add up to 3 tags from 200+ presets or create your own. Find anything instantly.
            </p>
        </div>

        <div class="right">
            <div class="mockup">
                <div class="mockup-header">Add tags</div>
                <div class="tag-grid">
                    <div class="tag selected">
                        <div class="tag-emoji">💻</div>
                        <div class="tag-name">Code</div>
                    </div>
                    <div class="tag selected">
                        <div class="tag-emoji">🐍</div>
                        <div class="tag-name">Python</div>
                    </div>
                    <div class="tag">
                        <div class="tag-emoji">⚛️</div>
                        <div class="tag-name">React</div>
                    </div>
                    <div class="tag">
                        <div class="tag-emoji">🎨</div>
                        <div class="tag-name">Design</div>
                    </div>
                    <div class="tag selected">
                        <div class="tag-emoji">📝</div>
                        <div class="tag-name">Tutorial</div>
                    </div>
                    <div class="tag">
                        <div class="tag-emoji">🚀</div>
                        <div class="tag-name">DevOps</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">pinboardgpt.app</div>
    </div>
</body>
</html>
