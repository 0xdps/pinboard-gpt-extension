<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b35 0%, #f59e0b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 25px;
            margin-bottom: 1.5rem;
        }

        .brand-icon {
            width: 20px;
            height: 20px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
        }

        .headline {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .subheadline {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="brand">
            <img src="../images/favicon-32x32.png" alt="Pinboard GPT" class="brand-icon">
            <span class="brand-name">Pinboard GPT</span>
        </div>

        <h1 class="headline">
            Never lose a<br>ChatGPT message
        </h1>

        <p class="subheadline">
            Save & organize what matters
        </p>
    </div>
</body>
</html>
