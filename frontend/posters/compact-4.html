<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            color: white;
        }

        .headline {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .popup-mockup {
            background: white;
            border-radius: 12px;
            padding: 18px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .search-bar {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }

        .pin-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .pin-title {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .pin-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .mini-tag {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="poster">
        <h1 class="headline">Search & Find Fast</h1>
        
        <div class="popup-mockup">
            <div class="search-bar">🔍 Search pins...</div>
            
            <div class="pin-item">
                <div class="pin-title">React optimization tips</div>
                <div class="pin-tags">
                    <span class="mini-tag">react</span>
                    <span class="mini-tag">performance</span>
                </div>
            </div>

            <div class="pin-item">
                <div class="pin-title">Python async guide</div>
                <div class="pin-tags">
                    <span class="mini-tag">python</span>
                    <span class="mini-tag">async</span>
                </div>
            </div>

            <div class="pin-item">
                <div class="pin-title">Docker best practices</div>
                <div class="pin-tags">
                    <span class="mini-tag">docker</span>
                    <span class="mini-tag">devops</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
