<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .poster {
            text-align: center;
            color: white;
        }

        .number {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .headline {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .description {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .search-demo {
            background: rgba(255, 255, 255, 0.95);
            color: #64748b;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="number">03</div>
        <h1 class="headline">Search &<br>Find Fast</h1>
        <p class="description">
            Fuzzy search finds anything
        </p>
        <div class="search-demo">🔍 Search pins...</div>
    </div>
</body>
</html>
