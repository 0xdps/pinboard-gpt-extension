<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pinboard GPT</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo img {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 14px;
            color: #718096;
        }

        .sign-in-btn {
            width: 100%;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .sign-in-btn:hover {
            background: #357ae8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.4);
        }

        .sign-in-btn:active {
            transform: translateY(0);
        }

        .sign-in-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .google-icon {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .status-message.info {
            background: #bee3f8;
            color: #2c5282;
            display: block;
        }

        .status-message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }

        .status-message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #a0aec0;
            font-size: 14px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e2e8f0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .info-text {
            text-align: center;
            color: #718096;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .loader {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #4285f4;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <img src="../images/favicon-64x64.png" alt="Pinboard GPT" onerror="this.src='../images/favicon-32x32.png'">
            <h1>Pinboard GPT</h1>
            <p>Sign in to sync your pins across devices</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <button id="signInBtn" class="sign-in-btn">
            <div class="google-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
                    <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.003 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
                </svg>
            </div>
            <span>Sign in with Google</span>
        </button>

        <div class="divider">OR</div>

        <div class="info-text">
            <p>Continue using the extension locally without signing in.</p>
            <p style="margin-top: 12px;">
                <a href="../index.html">← Back to Home</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://pinboard-gpt.dps.codes/api';
        const signInBtn = document.getElementById('signInBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Check if extension is installed - wait a bit for the content script to inject
        let isExtensionInstalled = false;
        
        function checkExtension() {
            isExtensionInstalled = window.pingptExtensionData !== undefined || 
                                  document.getElementById('pingpt-extension-marker') !== null;
            
            if (isExtensionInstalled) {
                showStatus('Extension detected! Click below to sign in.', 'info');
            } else {
                showStatus('Extension not detected. You can still sign in, but you\'ll need to manually copy your token.', 'info');
            }
        }

        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
        }

        // Check immediately and after a short delay
        setTimeout(checkExtension, 100);
        setTimeout(checkExtension, 500);

        signInBtn.addEventListener('click', async () => {
            try {
                signInBtn.disabled = true;
                signInBtn.innerHTML = '<div class="loader"></div><span>Redirecting...</span>';
                showStatus('Getting authorization URL...', 'info');

                // Get Google OAuth URL from backend
                const response = await fetch(`${API_BASE_URL}/auth/google/url`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to get auth URL');
                }

                // Redirect to Google OAuth
                window.location.href = data.url;
            } catch (error) {
                console.error('Sign-in error:', error);
                showStatus('Failed to start sign-in process. Please try again.', 'error');
                signInBtn.disabled = false;
                signInBtn.innerHTML = `
                    <div class="google-icon">
                        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                            <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
                            <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                            <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.003 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
                        </svg>
                    </div>
                    <span>Sign in with Google</span>
                `;
            }
        });
    </script>
</body>
</html>
